server {
    listen 80;
    server_name _;

    root /var/www/html/laravel-docker/public;
    index index.php index.html;

    client_max_body_size 15M;

    location = /manifest.json {
        alias /var/www/html/manifest.json;
        access_log off;
    }

    location ^~ /assets/ {
        root /var/www/html;
        expires 7d;
        access_log off;
        try_files $uri =404;
    }

    location ^~ /css/ {
        root /var/www/html;
        expires 7d;
        access_log off;
        try_files $uri =404;
    }

    location ^~ /js/ {
        root /var/www/html;
        expires 7d;
        access_log off;
        try_files $uri =404;
    }

    location ^~ /img/ {
        root /var/www/html;
        expires 7d;
        access_log off;
        try_files $uri =404;
    }

    location ^~ /admin/css/ {
        root /var/www/html;
        expires 7d;
        access_log off;
        try_files $uri =404;
    }

    location ^~ /admin/js/ {
        root /var/www/html;
        expires 7d;
        access_log off;
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ ^/(?:index|login)\.php$ {
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /var/www/html/laravel-docker/public/index.php;
        fastcgi_param SCRIPT_NAME /index.php;
        fastcgi_param DOCUMENT_ROOT /var/www/html/laravel-docker/public;
        fastcgi_index index.php;
        fastcgi_pass backend:9000;
    }

    location ~ ^/admin/(?:index|market_sections|change_password|edit|edit_translations|logout|ajax_quick_edit|ajax_quick_edit_save|ajax_sugerencias)\.php$ {
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /var/www/html/laravel-docker/public/index.php;
        fastcgi_param SCRIPT_NAME /index.php;
        fastcgi_param DOCUMENT_ROOT /var/www/html/laravel-docker/public;
        fastcgi_index index.php;
        fastcgi_pass backend:9000;
    }

    location = /ajax/generate_password.php {
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /var/www/html/laravel-docker/public/index.php;
        fastcgi_param SCRIPT_NAME /index.php;
        fastcgi_param DOCUMENT_ROOT /var/www/html/laravel-docker/public;
        fastcgi_index index.php;
        fastcgi_pass backend:9000;
    }

    location = /helpers/verify_malicious_photo.php {
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /var/www/html/laravel-docker/public/index.php;
        fastcgi_param SCRIPT_NAME /index.php;
        fastcgi_param DOCUMENT_ROOT /var/www/html/laravel-docker/public;
        fastcgi_index index.php;
        fastcgi_pass backend:9000;
    }

    location ~ ^/unity/(?:connection|get_all_puestos|get_info_puesto|get_info_nave_[0-9]+b?)\.php$ {
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /var/www/html/laravel-docker/public/index.php;
        fastcgi_param SCRIPT_NAME /index.php;
        fastcgi_param DOCUMENT_ROOT /var/www/html/laravel-docker/public;
        fastcgi_index index.php;
        fastcgi_pass backend:9000;
    }

    location = /index.php {
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /var/www/html/laravel-docker/public/index.php;
        fastcgi_param DOCUMENT_ROOT /var/www/html/laravel-docker/public;
        fastcgi_index index.php;
        fastcgi_pass backend:9000;
    }

    location ~ \.php$ {
        return 404;
    }

    location ~* \.(?:css|js|jpg|jpeg|png|gif|svg|ico|webp|woff|woff2)$ {
        expires 7d;
        access_log off;
        try_files $uri =404;
    }

    location ~ /\. {
        deny all;
    }
}
