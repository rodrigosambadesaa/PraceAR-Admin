services:
  frontend:
    image: nginx:1.27-alpine
    container_name: appventurers-frontend
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-8081}:80"
    volumes:
      - ./:/var/www/html:ro
      - ./docker/frontend/default.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    container_name: appventurers-backend
    working_dir: /var/www/html/laravel-docker
    environment:
      APP_ENV: local
      APP_DEBUG: "false"
      APP_URL: http://localhost:${FRONTEND_PORT:-8081}
      APP_KEY: "${APP_KEY:-base64:SZdNiFbW1nb3kvAYd0jHvYJn0UbSLEDpfL1GfvXtPJU=}"
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: dbs13217995
      DB_USERNAME: appventurers
      DB_PASSWORD: appventurers
      LOG_CHANNEL: stderr
      SESSION_DRIVER: file
      CACHE_STORE: file
      QUEUE_CONNECTION: sync
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: mysql:8.0
    container_name: appventurers-db
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_DATABASE: dbs13217995
      MYSQL_USER: appventurers
      MYSQL_PASSWORD: appventurers
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - db_data:/var/lib/mysql
      - ./dbs13217995.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: [ "CMD-SHELL", "mysqladmin ping -h localhost -uroot -proot" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped

volumes:
  db_data:
