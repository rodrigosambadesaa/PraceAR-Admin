services:
  frontend:
    image: nginx:1.27-alpine
    container_name: appventurers-frontend
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-8081}:80"
    volumes:
      - ./:/var/www/html:ro
      - ./docker/frontend/default.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    container_name: appventurers-backend
    environment:
      APP_ENV: development
      APP_BASE_URL: http://localhost:${FRONTEND_PORT:-8081}/
      PRACEAR_DB_HOST: db
      PRACEAR_DB_USER: appventurers
      PRACEAR_DB_PASSWORD: appventurers
      PRACEAR_DB_NAME: dbs13217995
    volumes:
      - ./:/var/www/html
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: mysql:8.0
    container_name: appventurers-db
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_DATABASE: dbs13217995
      MYSQL_USER: appventurers
      MYSQL_PASSWORD: appventurers
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - db_data:/var/lib/mysql
      - ./dbs13217995.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: [ "CMD-SHELL", "mysqladmin ping -h localhost -uroot -proot" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped

volumes:
  db_data:
